[nosetests]
verbosity=2
exe=1
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[coverage:run]
branch = True
source = service
omit =
    venv/*
    .venv/*

[coverage:report]
show_missing = True

[flake8]
max-line-length = 127
max-complexity = 10
exclude = .git,__pycache__,venv,.venv,docs

[pylint]
max-line-length = 127
disable = E1101,W0703,C0114,R0903,W0613
